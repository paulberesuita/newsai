name = "newsai"
main = "src/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "public"

[triggers]
crons = ["0 */4 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "newsai"
database_id = "e9efc42d-7b55-4afb-8d5d-ff85e02d222c"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "newsai-assets"

[ai]
binding = "AI"
